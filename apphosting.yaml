# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Public Firebase Web config is safe to expose to the browser.
# Set these values for your project (see .env.local.example).
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FUNCTIONS_REGION
    value: "asia-southeast1"
    availability:
      - BUILD
      - RUNTIME
