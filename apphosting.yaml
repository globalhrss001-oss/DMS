# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Public Firebase Web config is safe to expose to the browser (data is
# protected by Security Rules, not by hiding these client identifiers).
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAK_l3kxvymOwnBgiZGyjV3w2hFwvRndHM"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "global-hr-dms.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "global-hr-dms"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "global-hr-dms.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "162827183371"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:162827183371:web:b5c1793ea06bf2c42dee0e"
    availability:
      - BUILD
      - RUNTIME
